<nav class="main-content">
    <form class="search-form" id="searchForm" role="search">
    <i class="bi bi-search search-icon"></i>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
        <button class="modal-close" id="modalClose">
            <i class="bi bi-x-lg"></i>
        </button>
        <div class="modal-body">
            <div class="modal-img-wrap">
                <img src="" alt="" id="modalImg" />
            </div>
            <div class="modal-info">
                <div class="modal-photographer">
                    <div class="modal-avatar" id="modalAvatar"></div>
                    <div>
                        <p class="modal-name" id="modalName"></p>
                        <p class="modal-username" id="modalUsername"></p>
                    </div>
                </div>
                <p class="modal-desc" id="modalDesc"></p>
                <div class="modal-stats">
                    <div class="modal-stat">
                        <i class="bi bi-heart"></i>
                        <span id="modalLikes"></span>
                    </div>
                    <div class="modal-stat">
                        <i class="bi bi-download"></i>
                        <span id="modalDownloads">—</span>
                    </div>
                </div>
                <a class="modal-download-btn" id="modalDownloadBtn" href="" download target="_blank">
                    <i class="bi bi-download"></i> Descargar
                </a>
            </div>
        </div>
    </div>
